{{- if and .Values.app.embeddingsApiKey .Values.app.embeddingsApiKeyExistingSecret }}
  {{- fail "Cannot set both app.embeddingsApiKey and app.embeddingsApiKeyExistingSecret — env overrides envFrom and can cause confusing behavior" }}
{{- end }}
{{- if not .Values.app.existingSecret }}
{{- $registryUrl := .Values.app.registryUrl }}
{{- if .Values.global.domain }}
  {{- $registryUrl = printf "http://registry.%s.svc.cluster.local:8000" .Release.Namespace }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.app.envSecretName }}
  namespace: {{ .Release.Namespace | quote }}
data:
  PORT: {{ .Values.app.port | toString | b64enc | quote }}
  REGISTRY_BASE_URL: {{ $registryUrl | b64enc | quote }}
  EMBEDDINGS_PROVIDER: {{ .Values.app.embeddingsProvider | b64enc | quote }}
  EMBEDDINGS_MODEL_NAME: {{ .Values.app.embeddingsModelName | b64enc | quote }}
  EMBEDDINGS_MODEL_DIMENSIONS: {{ .Values.app.embeddingsModelDimensions | b64enc | quote }}
  {{- if and .Values.app.embeddingsApiKey (not .Values.app.embeddingsApiKeyExistingSecret) }}
  EMBEDDINGS_API_KEY: {{ .Values.app.embeddingsApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.app.embeddingsApiBase }}
  EMBEDDINGS_API_BASE: {{ .Values.app.embeddingsApiBase | b64enc | quote }}
  {{- end }}
  EMBEDDINGS_AWS_REGION: {{ .Values.app.embeddingsAwsRegion | b64enc | quote }}
{{- if not .Values.global.sharedSecretName }}
  {{/* SECRET_KEY managed per-chart in standalone deployment */}}
  SECRET_KEY: {{ required "app.secretKey or global.secretKey is required for standalone deployment" (.Values.global.secretKey | default .Values.app.secretKey) | b64enc | quote }}
{{- end }}
{{- end }}
